server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # WASM + ES module mime types (the defaults are usually fine on nginx >=1.21,
    # but pin them so older base images keep working).
    types {
        application/wasm        wasm;
        application/javascript  js mjs;
        application/json        json;
        text/html               html htm;
        text/css                css;
        image/png               png;
        image/svg+xml           svg svgz;
        font/woff               woff;
        font/woff2              woff2;
        font/ttf                ttf;
    }
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ =404;
    }
}
